<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QuickRewrite Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>QuickRewrite</h1>

  <section>
    <h2>AI Provider</h2>
    <div class="row">
      <label for="provider">Provider</label>
      <select id="provider">
        <option value="anthropic">Claude (Anthropic)</option>
        <option value="openai">OpenAI</option>
        <option value="gemini">Gemini</option>
        <option value="openrouter">OpenRouter</option>
      </select>
    </div>
    <div class="row">
      <label for="model">Model</label>
      <input id="model" type="text" placeholder="e.g. claude-opus-4-8" />
    </div>
    <div class="row">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Enter to update" />
      <button id="saveKey">Save</button>
      <button id="testKey">Test</button>
    </div>
    <div id="keyStatus" class="status"></div>
    <div id="testStatus" class="status"></div>
  </section>

  <section>
    <h2>Actions &amp; Hotkeys</h2>
    <div id="actionsList"></div>
    <button id="addAction">+ Add action</button>
  </section>

  <section>
    <h2>General</h2>
    <div class="row">
      <label for="launchAtLogin">Launch at login</label>
      <input id="launchAtLogin" type="checkbox" />
    </div>
  </section>

  <template id="actionRowTemplate">
    <div class="action-row" data-id="">
      <input class="action-name" type="text" placeholder="Action name" />
      <input class="action-hotkey" type="text" placeholder="Click and press keys…" readonly />
      <textarea class="action-instruction" placeholder="Instruction sent to the AI"></textarea>
      <div class="action-buttons">
        <button class="action-save">Save</button>
        <button class="action-delete">Delete</button>
      </div>
      <div class="action-status status"></div>
    </div>
  </template>

  <script src="settings.js"></script>
</body>
</html>
